# Docker Compose for aaPanel Production Deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: syncspace-backend:latest
    container_name: syncspace-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # Only accessible via localhost (Nginx proxy)
    volumes:
      - ./data:/data
      - ./uploads:/uploads
    environment:
      - SYNCSPACE_ADDR=:8080
      - SYNCSPACE_DB_PATH=/data/syncspace.db
    networks:
      - syncspace-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: syncspace-frontend:latest
    container_name: syncspace-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"  # Only accessible via localhost (Nginx proxy)
    depends_on:
      - backend
    networks:
      - syncspace-network

networks:
  syncspace-network:
    driver: bridge
